<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sign up</title>
</head>
<body>
    
    <h2>Sign Up</h2>
    <hr>
    <form action="login.html">

        <label for="txt">Username:</label>
        <br>
        <input type="text" name="username" id="txt" placeholder="username" required>
        <br><br>

        <label for="em">Email:</label>
        <br>
        <input type="email" name="email" id="em" placeholder="email" required>
        <br><br>

        <label for="pass">Password:</label>
        <br>
        <input type="password" name="password" id="pass" placeholder="password" required>
        <br><br>

        <label for="conpass">Confirm Password:</label>
        <br>
        <input type="password" name="confirm_password" id="conpass" placeholder="confirm password" required>
        <br><br>

        <label>Register as Admin:</label>
        <input type="checkbox" name="is_admin" value="true">
        <br><br>

        <input type="submit" value="Sign Up">

    </form>

</body>
</html>

</body>
</html>
